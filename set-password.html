<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Definir senha — Barbearia</title>
  <link rel="stylesheet" href="./admin.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>
  <div class="tela-login">
    <div class="cartao-login">
      <div class="marca-login">
        <span class="listra"></span>
        💈 Barbearia
      </div>
      <p class="subtitulo" id="subtitulo">Crie sua senha de acesso ao painel.</p>

      <div id="area-erro"></div>
      <div id="area-sucesso"></div>

      <form id="form-senha">
        <div class="campo">
          <label for="senha">Nova senha</label>
          <input type="password" id="senha" placeholder="Mínimo 8 caracteres" required minlength="8" />
        </div>
        <div class="campo">
          <label for="confirmar">Confirmar senha</label>
          <input type="password" id="confirmar" placeholder="Repita a senha" required minlength="8" />
        </div>
        <button type="submit" class="botao botao-primario" id="botao-salvar">Definir senha e entrar</button>
      </form>

      <div id="area-carregando" style="display:none; text-align:center; color:var(--text-muted); padding: 1rem 0;">
        Verificando convite…
      </div>
    </div>
  </div>

  <script type="module">
    import { supabase } from './supabase.js';

    const form        = document.getElementById('form-senha');
    const areaErro    = document.getElementById('area-erro');
    const areaSucesso = document.getElementById('area-sucesso');
    const botao       = document.getElementById('botao-salvar');
    const carregando  = document.getElementById('area-carregando');
    const subtitulo   = document.getElementById('subtitulo');

    function mostrarErro(msg) {
      areaErro.innerHTML = `<div class="mensagem-erro">${msg}</div>`;
    }

    // O Supabase inclui os tokens na URL como fragment (#access_token=...&type=invite)
    // ou como query string dependendo da versão. Este código trata os dois casos.
    async function verificarConvite() {
      // Tenta detectar a sessão automaticamente a partir do fragment da URL.
      // O SDK do Supabase faz isso sozinho ao chamar getSession() logo após
      // o redirecionamento do link de convite.
      const { data: { session } } = await supabase.auth.getSession();

      if (session) {
        // Já tem sessão (link de convite foi processado pelo SDK automaticamente).
        return true;
      }

      // Fallback: lê o fragment manualmente (links mais antigos do Supabase).
      const hash = window.location.hash.substring(1);
      const params = new URLSearchParams(hash);
      const accessToken  = params.get('access_token');
      const refreshToken = params.get('refresh_token');
      const type         = params.get('type');

      if (!accessToken || (type !== 'invite' && type !== 'recovery' && type !== 'signup')) {
        mostrarErro('Link de convite inválido ou expirado. Solicite um novo convite.');
        form.style.display = 'none';
        return false;
      }

      // Estabelece a sessão manualmente com o token do fragment.
      const { error } = await supabase.auth.setSession({ access_token: accessToken, refresh_token: refreshToken });
      if (error) {
        mostrarErro('Link de convite inválido ou expirado. Solicite um novo convite.');
        form.style.display = 'none';
        return false;
      }

      return true;
    }

    async function init() {
      form.style.display = 'none';
      carregando.style.display = 'block';

      const ok = await verificarConvite();

      carregando.style.display = 'none';
      if (ok) form.style.display = 'block';
    }

    form.addEventListener('submit', async (ev) => {
      ev.preventDefault();
      areaErro.innerHTML = '';

      const senha     = document.getElementById('senha').value;
      const confirmar = document.getElementById('confirmar').value;

      if (senha !== confirmar) {
        mostrarErro('As senhas não coincidem.');
        return;
      }
      if (senha.length < 8) {
        mostrarErro('A senha deve ter pelo menos 8 caracteres.');
        return;
      }

      botao.disabled = true;
      botao.textContent = 'Salvando…';

      const { error } = await supabase.auth.updateUser({ password: senha });

      if (error) {
        mostrarErro(error.message || 'Não foi possível definir a senha. Tente novamente.');
        botao.disabled = false;
        botao.textContent = 'Definir senha e entrar';
        return;
      }

      areaSucesso.innerHTML = `
        <div style="background:#E8EFE9; color:#2F4F3E; border-radius:6px; padding:0.6rem 0.75rem; font-size:0.85rem; margin-bottom:0.75rem;">
          Senha definida com sucesso! Redirecionando…
        </div>
      `;
      botao.style.display = 'none';

      setTimeout(() => {
        window.location.href = './admin.html';
      }, 1500);
    });

    init();
  </script>
</body>
</html>
